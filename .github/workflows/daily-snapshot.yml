name: TitansDB guild daily snapshot

on:
  schedule:
    # Run every day at 10:45 in Asia/Shanghai.
    - cron: "45 10 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: "Optional YYYY-MM-DD date override. Empty means today."
        required: false
        type: string
      readme_days:
        description: "Number of recent days to show in README."
        required: false
        default: "30"
        type: string

permissions:
  contents: write

concurrency:
  group: titansdb-guild-daily-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch today's snapshot
        env:
          TITANSDB_API_KEY: ${{ secrets.TITANSDB_API_KEY }}
          SNAPSHOT_DATE: ${{ github.event.inputs.snapshot_date }}
        run: |
          if [ -n "$SNAPSHOT_DATE" ]; then
            python3 scripts/fetch_snapshot.py --config config/guilds.json --output-dir data --date "$SNAPSHOT_DATE" || echo "Fetch failed; existing successful same-day data was kept when present."
          else
            python3 scripts/fetch_snapshot.py --config config/guilds.json --output-dir data || echo "Fetch failed; existing successful same-day data was kept when present."
          fi

      - name: Commit snapshot data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "Add TitansDB guild snapshot"

      - name: Update README
        env:
          README_DAYS: ${{ github.event.inputs.readme_days || '30' }}
        run: |
          python3 scripts/build_readme.py --config config/guilds.json --data-dir data --reports-dir reports --output README.md --days "$README_DAYS"

      - name: Commit reports
        run: |
          git add README.md reports
          git diff --cached --quiet || git commit -m "Update TitansDB investment README"
          git push
