<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TitansDB 公会投资看板</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --surface: #ffffff;
        --surface-2: #eef2f7;
        --text: #17202a;
        --muted: #657181;
        --line: #dce3ec;
        --blue: #2364aa;
        --green: #17805d;
        --amber: #a35f00;
        --red: #b42318;
        --shadow: 0 8px 24px rgba(24, 38, 56, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      a {
        color: var(--blue);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .shell {
        width: min(1360px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 44px;
      }

      header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 20px;
        align-items: end;
        margin-bottom: 22px;
      }

      .title-block h1 {
        margin: 0;
        font-size: clamp(26px, 3vw, 42px);
        line-height: 1.12;
        letter-spacing: 0;
      }

      .title-block p {
        margin: 10px 0 0;
        color: var(--muted);
        max-width: 760px;
      }

      .status {
        display: inline-grid;
        gap: 4px;
        justify-items: end;
        color: var(--muted);
        font-size: 13px;
      }

      .status strong {
        color: var(--text);
        font-size: 14px;
      }

      .summary-grid,
      .guild-card,
      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0;
        margin-bottom: 18px;
        padding: 14px 16px;
      }

      .metric {
        padding: 2px 16px;
        border-right: 1px solid var(--line);
      }

      .metric:last-child {
        border-right: 0;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 13px;
      }

      .metric strong {
        display: block;
        margin-top: 4px;
        font-size: 24px;
        line-height: 1.15;
      }

      .metric .delta,
      .delta {
        color: var(--green);
        font-weight: 700;
      }

      .delta.negative {
        color: var(--red);
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(430px, 1.45fr) minmax(120px, 140px) minmax(220px, 1fr) minmax(150px, 190px);
        gap: 12px;
        align-items: center;
        margin: 18px 0;
      }

      input,
      select,
      button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        font: inherit;
      }

      input,
      select {
        width: 100%;
        padding: 0 12px;
      }

      button {
        padding: 0 14px;
        cursor: pointer;
      }

      button.active {
        border-color: var(--blue);
        background: #e8f1fb;
        color: #123f73;
        font-weight: 700;
      }

      .sort-button {
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        gap: 4px;
        min-height: auto;
        padding: 0;
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        font-weight: 700;
      }

      .sort-button:hover {
        color: var(--blue);
      }

      .sort-button.active {
        background: transparent;
        color: var(--blue);
      }

      .sort-indicator {
        display: inline-block;
        min-width: 10px;
        color: var(--muted);
        font-size: 11px;
      }

      .date-range {
        display: grid;
        grid-template-columns: repeat(2, minmax(140px, 1fr));
        gap: 8px 10px;
        align-items: end;
      }

      .date-field {
        display: grid;
        gap: 4px;
      }

      .date-field span,
      .date-note {
        color: var(--muted);
        font-size: 12px;
      }

      .date-note {
        grid-column: 1 / -1;
        min-height: 18px;
        white-space: nowrap;
      }

      .guild-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .guild-card {
        padding: 14px;
        display: grid;
        gap: 10px;
        min-height: 190px;
      }

      .guild-card header {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
        margin: 0;
      }

      .guild-card h2 {
        margin: 0;
        font-size: 17px;
      }

      .guild-card .sub {
        color: var(--muted);
        font-size: 12px;
        word-break: break-all;
      }

      .guild-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .guild-stats div {
        background: var(--surface-2);
        border-radius: 6px;
        padding: 8px;
      }

      .guild-stats span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .guild-stats strong {
        display: block;
        margin-top: 2px;
      }

      .guild-ranking {
        display: grid;
        gap: 7px;
        padding-top: 2px;
      }

      .guild-ranking-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .rank-list {
        display: grid;
        gap: 4px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .rank-row {
        display: grid;
        grid-template-columns: 24px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        min-height: 28px;
        padding: 5px 7px;
        border-radius: 6px;
        background: var(--surface-2);
      }

      .rank-row.muted {
        opacity: 0.45;
      }

      .rank-index {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .rank-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
        font-weight: 700;
      }

      .rank-value {
        font-size: 12px;
        white-space: nowrap;
      }

      .panel {
        overflow: hidden;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 16px;
        border-bottom: 1px solid var(--line);
      }

      .panel-head h2 {
        margin: 0;
        font-size: 18px;
      }

      .panel-head p {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .table-wrap {
        overflow: auto;
        max-height: 70vh;
      }

      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        min-width: 980px;
        font-size: 13px;
      }

      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        text-align: right;
        white-space: nowrap;
      }

      th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: #f0f4f9;
        color: #334155;
        font-weight: 700;
      }

      th:first-child,
      td:first-child,
      th:nth-child(2),
      td:nth-child(2) {
        position: sticky;
        z-index: 2;
        background: var(--surface);
      }

      th:first-child,
      td:first-child {
        left: 0;
        min-width: 64px;
        text-align: center;
      }

      th:nth-child(2),
      td:nth-child(2) {
        left: 64px;
        text-align: left;
        min-width: 210px;
      }

      th:first-child {
        z-index: 3;
        background: #f0f4f9;
      }

      th:nth-child(2) {
        z-index: 3;
        background: #f0f4f9;
      }

      .name {
        font-weight: 700;
      }

      .meta {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 400;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 0 8px;
        border-radius: 999px;
        background: #fff5db;
        color: #7a4200;
        font-size: 12px;
        font-weight: 700;
      }

      .empty,
      .error {
        padding: 18px;
        color: var(--muted);
      }

      .error {
        color: var(--red);
      }

      footer {
        margin-top: 18px;
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 980px) {
        header,
        .toolbar {
          grid-template-columns: 1fr;
        }

        .status {
          justify-items: start;
        }

        .summary-grid,
        .guild-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .metric {
          border-right: 0;
        }

        .metric:nth-child(odd) {
          border-right: 1px solid var(--line);
        }

        .metric:nth-child(n + 3) {
          padding-top: 12px;
          border-top: 1px solid var(--line);
        }

        .date-range {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 620px) {
        .shell {
          width: min(100% - 20px, 1360px);
          padding-top: 18px;
        }

        .summary-grid {
          margin-bottom: 12px;
          padding: 10px 12px;
        }

        .metric {
          padding: 0 10px;
        }

        .metric span {
          font-size: 12px;
        }

        .metric strong {
          font-size: 18px;
        }

        .metric .delta {
          font-size: 12px;
        }

        .guild-grid {
          grid-template-columns: 1fr;
        }

        .panel-head {
          display: block;
        }

        th,
        td {
          padding: 9px 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header style="display:none; ">
        <div class="status" aria-live="polite">
          <span>数据状态</span>
          <strong id="statusText">加载中</strong>
          <span id="generatedAt"></span>
        </div>
      </header>

      <section class="summary-grid" id="summaryGrid" aria-label="总览"></section>

      <section class="toolbar" aria-label="筛选">
        <div class="date-range" aria-label="统计日期">
          <label class="date-field">
            <span>统计日期</span>
            <input id="targetDateInput" type="date" />
          </label>
          <label class="date-field">
            <span>对比日期</span>
            <input id="baseDateInput" type="date" />
          </label>
          <span class="date-note" id="dateNote"></span>
        </div>
        <select id="rankLimitSelect" aria-label="卡片排名数量">
          <option value="5">Top 5</option>
          <option value="10">Top 10</option>
          <option value="20" selected>Top 20</option>
        </select>
        <input id="searchInput" type="search" placeholder="搜索成员、公会、职位" />
        <select id="guildSelect" aria-label="选择公会"></select>
      </section>

      <section class="guild-grid" id="guildGrid" aria-label="公会概览"></section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>成员投资明细</h2>
            <p id="tableNote">最新日期在左侧，括号内为较上一投资记录变化。</p>
          </div>
          <span class="pill" id="rowCount">0 行</span>
        </div>
        <div class="table-wrap" id="tableWrap"></div>
      </section>
    </main>

    <script>
      const NUMBER_UNITS = [
        { threshold: 1000000000000, suffix: "T" },
        { threshold: 1000000000, suffix: "G" },
        { threshold: 1000000, suffix: "M" },
        { threshold: 1000, suffix: "K" },
      ];
      const state = {
        memberStore: null,
        guildStore: null,
        guildModels: [],
        globalMembers: [],
        allDates: [],
        selectedGuild: "all",
        requestedTargetDate: "",
        requestedBaseDate: "",
        rankLimit: 20,
        tableSort: null,
        query: "",
      };

      const els = {
        statusText: document.querySelector("#statusText"),
        generatedAt: document.querySelector("#generatedAt"),
        summaryGrid: document.querySelector("#summaryGrid"),
        guildGrid: document.querySelector("#guildGrid"),
        guildSelect: document.querySelector("#guildSelect"),
        rankLimitSelect: document.querySelector("#rankLimitSelect"),
        searchInput: document.querySelector("#searchInput"),
        tableWrap: document.querySelector("#tableWrap"),
        rowCount: document.querySelector("#rowCount"),
        tableNote: document.querySelector("#tableNote"),
        targetDateInput: document.querySelector("#targetDateInput"),
        baseDateInput: document.querySelector("#baseDateInput"),
        dateNote: document.querySelector("#dateNote"),
      };

      function formatDateTime(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat("zh-CN", {
          dateStyle: "medium",
          timeStyle: "short",
        }).format(date);
      }

      function formatAmount(value) {
        if (!Number.isFinite(value)) return "-";
        const absolute = Math.abs(value);
        const unit = NUMBER_UNITS.find((item) => absolute >= item.threshold);
        if (!unit) return String(value);
        const scaled = (value / unit.threshold)
          .toFixed(2)
          .replace(/\.00$/, "")
          .replace(/(\.\d)0$/, "$1");
        return `${scaled}${unit.suffix}`;
      }

      function formatDelta(value) {
        if (!Number.isFinite(value)) return "";
        const sign = value > 0 ? "+" : "";
        return `${sign}${formatAmount(value)}`;
      }

      function sortButton(key, label) {
        const active = state.tableSort?.key === key;
        const direction = active ? state.tableSort.direction : "";
        const indicator = active ? (direction === "asc" ? "↑" : "↓") : "";
        return `
          <button class="sort-button ${active ? "active" : ""}" type="button" data-sort-key="${key}">
            <span>${label}</span>
            <span class="sort-indicator" aria-hidden="true">${indicator}</span>
          </button>
        `;
      }

      function levelNumber(value) {
        const number = Number(value);
        return Number.isFinite(number) ? number : -Infinity;
      }

      function sortTableRows(rows) {
        const currentOrder = [...rows].sort((a, b) => b.latest - a.latest);
        if (!state.tableSort) return currentOrder;

        const direction = state.tableSort.direction === "asc" ? 1 : -1;
        const valueByKey = {
          level: (row) => levelNumber(row.member.level),
          latest: (row) => row.latest,
          growth: (row) => row.growth,
        };
        const getValue = valueByKey[state.tableSort.key];
        if (!getValue) return currentOrder;

        return currentOrder.sort((a, b) => {
          const difference = getValue(a) - getValue(b);
          if (difference !== 0) return difference * direction;
          return b.latest - a.latest;
        });
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => {
          const entities = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };
          return entities[char];
        });
      }

      function toDateInputValue(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function dateFromInputValue(value) {
        const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(value || "");
        if (!match) return null;
        const [, year, month, day] = match.map(Number);
        const date = new Date(year, month - 1, day);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function previousMonthEnd(value) {
        const date = dateFromInputValue(value) || new Date();
        return toDateInputValue(new Date(date.getFullYear(), date.getMonth(), 0));
      }

      function nearestAvailableDate(dates, requestedDate) {
        const requested = dateFromInputValue(requestedDate);
        if (!dates.length) return "";
        if (!requested) return dates.at(-1);
        let bestDate = dates[0];
        let bestDistance = Math.abs(dateFromInputValue(bestDate) - requested);
        for (const date of dates.slice(1)) {
          const distance = Math.abs(dateFromInputValue(date) - requested);
          if (distance < bestDistance) {
            bestDate = date;
            bestDistance = distance;
          }
        }
        return bestDate;
      }

      function selectedDateWindow(dates) {
        const sortedDates = [...dates].sort();
        const targetDate = nearestAvailableDate(sortedDates, state.requestedTargetDate);
        const baseDate = nearestAvailableDate(sortedDates, state.requestedBaseDate);
        if (!targetDate || !baseDate) {
          return { baseDate: "", targetDate: "", dates: [] };
        }
        const startDate = targetDate < baseDate ? targetDate : baseDate;
        const endDate = targetDate < baseDate ? baseDate : targetDate;
        return {
          baseDate,
          targetDate,
          dates: sortedDates.filter((date) => date >= startDate && date <= endDate),
        };
      }

      function valueAtDate(member, date) {
        if (!date) return 0;
        return member.byDate.get(date) || 0;
      }

      function investmentMap(record) {
        const values = new Map();
        for (const [date, value] of Object.entries(record?.investments || {})) {
          const number = Number(value);
          if (Number.isFinite(number)) values.set(date, number);
        }
        return values;
      }

      function buildMemberRecord(id, nameFallback, guildNames) {
        const stored = state.memberStore?.members?.[id] || {};
        return {
          id,
          name: String(nameFallback || stored.name || id),
          level: stored.level || "",
          role: String(stored.role || ""),
          guildNames: [...guildNames],
          byDate: investmentMap(stored),
        };
      }

      function latestValue(member, dates) {
        for (const date of [...dates].reverse()) {
          if (member.byDate.has(date)) return member.byDate.get(date);
        }
        return 0;
      }

      function earliestValue(member, dates) {
        for (const date of dates) {
          if (member.byDate.has(date)) return member.byDate.get(date);
        }
        return latestValue(member, dates);
      }

      function buildGuildModel(guild) {
        const members = [];
        const dateSet = new Set();
        const listedMembers = Array.isArray(guild.members) ? guild.members : [];

        for (const item of listedMembers) {
          const id = String(item?.id || "");
          if (!id) continue;
          const member = buildMemberRecord(id, item?.name, [guild.name]);
          member.guildSlug = guild.slug;
          member.guildName = guild.name;
          member.byDate.forEach((_, date) => dateSet.add(date));
          members.push(member);
        }

        const dates = [...dateSet].sort();
        const latestDate = dates.at(-1) || "";
        const earliestDate = dates[0] || "";
        const rows = [...members.values()].sort(
          (a, b) => latestValue(b, dates) - latestValue(a, dates),
        );
        const totals = dates.map((date) => ({
          date,
          value: rows.reduce((sum, member) => sum + (member.byDate.get(date) || 0), 0),
        }));
        const latestTotal = rows.reduce((sum, member) => sum + latestValue(member, dates), 0);
        const earliestTotal = rows.reduce((sum, member) => sum + earliestValue(member, dates), 0);

        return {
          ...guild,
          dates,
          members: rows,
          totals,
          latestDate,
          earliestDate,
          fetchedAt: guild.fetched_at || "",
          latestMemberCount: listedMembers.length,
          latestTotal,
          growth: latestTotal - earliestTotal,
        };
      }

      function buildGlobalMembers(models) {
        const byId = new Map();
        for (const guild of models) {
          for (const member of guild.members) {
            if (!byId.has(member.id)) {
              byId.set(member.id, buildMemberRecord(member.id, member.name, []));
            }
            const record = byId.get(member.id);
            const names = new Set(record.guildNames);
            names.add(guild.name);
            record.guildNames = [...names];
          }
        }
        return [...byId.values()].sort((a, b) => latestValue(b, state.allDates) - latestValue(a, state.allDates));
      }

      function metric(label, value, delta) {
        const deltaMarkup =
          delta === undefined
            ? ""
            : `<span class="delta ${delta < 0 ? "negative" : ""}">${formatDelta(delta)}</span>`;
        return `<article class="metric"><span>${label}</span><strong>${value}</strong>${deltaMarkup}</article>`;
      }

      function intervalMemberStats(guild) {
        const { baseDate, targetDate } = selectedDateWindow(guild.dates);
        return guild.members
          .map((member) => {
            const latest = valueAtDate(member, targetDate);
            const earliest = valueAtDate(member, baseDate);
            return {
              member,
              latest,
              growth: latest - earliest,
            };
          })
          .sort((a, b) => b.growth - a.growth || b.latest - a.latest);
      }

      function renderGuildRanking(guild) {
        const ranking = intervalMemberStats(guild).slice(0, state.rankLimit);
        const { baseDate, targetDate } = selectedDateWindow(guild.dates);
        const rangeLabel = targetDate && baseDate ? `${baseDate} 对比 ${targetDate}` : "暂无投资记录";
        const rows = ranking.length
          ? ranking
              .map(
                ({ member, growth }, index) => `
                  <li class="rank-row ${growth === 0 ? "muted" : ""}" title="${escapeHtml(member.name)}">
                    <span class="rank-index">${index + 1}</span>
                    <span class="rank-name">${escapeHtml(member.name)}</span>
                    <span class="rank-value delta">${growth === 0 ? "0" : formatDelta(growth) || "-"}</span>
                  </li>
                `,
              )
              .join("")
          : `<li class="rank-row"><span class="rank-index">-</span><span class="rank-name">暂无数据</span><span class="rank-value">-</span></li>`;

        return `
          <div class="guild-ranking">
            <div class="guild-ranking-title">
              <span>区间新增投资 Top ${state.rankLimit}</span>
              <span>${escapeHtml(rangeLabel)}</span>
            </div>
            <ol class="rank-list">${rows}</ol>
          </div>
        `;
      }

      function renderSummary() {
        const models = state.guildModels;
        const { baseDate, targetDate, dates } = selectedDateWindow(state.allDates);
        const latestTotal = state.globalMembers.reduce((sum, member) => sum + valueAtDate(member, targetDate), 0);
        const growth = state.globalMembers.reduce(
          (sum, member) => sum + valueAtDate(member, targetDate) - valueAtDate(member, baseDate),
          0,
        );
        const memberCount = state.globalMembers.length;
        els.summaryGrid.innerHTML = [
          metric("公会数量", models.length),
          metric("统计区间", dates.length ? `${baseDate} → ${targetDate}` : "-"),
          metric("统计总投资", formatAmount(latestTotal), growth),
          metric("唯一成员", memberCount),
        ].join("");
      }

      function renderDateControls() {
        els.targetDateInput.value = state.requestedTargetDate;
        els.baseDateInput.value = state.requestedBaseDate;
        const { baseDate, targetDate } = selectedDateWindow(state.allDates);
        const matched = baseDate !== state.requestedBaseDate || targetDate !== state.requestedTargetDate;
        els.dateNote.textContent =
          baseDate && targetDate
            ? `实际使用：${targetDate} 对比 ${baseDate}${matched ? "（已匹配最接近日期）" : ""}`
            : "暂无可用日期";
      }

      function renderGuildSelect() {
        els.guildSelect.innerHTML = [
          `<option value="all">全部公会</option>`,
          ...state.guildModels.map(
            (guild) => `<option value="${escapeHtml(guild.slug)}">${escapeHtml(guild.name)}</option>`,
          ),
        ].join("");
        els.guildSelect.value = state.selectedGuild;
      }

      function renderGuildCards() {
        els.guildGrid.innerHTML = state.guildModels
          .map(
            (guild) => {
              const { baseDate, targetDate } = selectedDateWindow(guild.dates);
              const targetTotal = guild.members.reduce((sum, member) => sum + valueAtDate(member, targetDate), 0);
              const baseTotal = guild.members.reduce((sum, member) => sum + valueAtDate(member, baseDate), 0);
              const growth = targetTotal - baseTotal;
              return `
                <article class="guild-card">
                  <header>
                    <div>
                      <h2>${escapeHtml(guild.name)}</h2>
                      <span class="sub">${escapeHtml(guild.guild_id)}</span>
                    </div>
                    <a href="${escapeHtml(guild.guild_url)}" target="_blank" rel="noreferrer">TitansDB</a>
                  </header>
                  <div class="guild-stats">
                    <div><span>统计日期</span><strong>${escapeHtml(targetDate || "-")}</strong></div>
                    <div><span>成员数</span><strong>${guild.latestMemberCount}</strong></div>
                    <div><span>总投资</span><strong>${formatAmount(targetTotal)}</strong></div>
                    <div><span>对比增长</span><strong class="delta ${growth < 0 ? "negative" : ""}">${formatDelta(growth) || "-"}</strong></div>
                  </div>
                  ${renderGuildRanking(guild)}
                </article>
              `;
            },
          )
          .join("");
      }

      function getVisibleModels() {
        if (state.selectedGuild === "all") return state.guildModels;
        return state.guildModels.filter((guild) => guild.slug === state.selectedGuild);
      }

      function getRowsAndDates() {
        if (state.selectedGuild === "all") {
          const window = selectedDateWindow(state.allDates);
          return {
            ...window,
            rows: state.globalMembers.map((member) => ({ member })),
            dates: window.dates.slice().reverse(),
          };
        }

        const guild = state.guildModels.find((item) => item.slug === state.selectedGuild);
        if (!guild) return { rows: [], dates: [] };
        const window = selectedDateWindow(guild.dates);
        return {
          ...window,
          rows: guild.members.map((member) => ({ member })),
          dates: window.dates.slice().reverse(),
        };
      }

      function renderTable() {
        const { rows, dates, baseDate, targetDate } = getRowsAndDates();
        const query = state.query.trim().toLowerCase();
        const filtered = sortTableRows(rows
          .filter(({ member }) => {
            if (!query) return true;
            return [member.name, member.guildName, ...(member.guildNames || []), member.role, member.level]
              .join(" ")
              .toLowerCase()
              .includes(query);
          })
          .map(({ member }) => {
            const latest = valueAtDate(member, targetDate);
            const earliest = valueAtDate(member, baseDate);
            return { member, latest, growth: latest - earliest };
          }));

        els.rowCount.textContent = `${filtered.length} 行`;
        els.tableNote.textContent = dates.length
          ? `当前按 ${targetDate} 对比 ${baseDate} 统计增长；明细展示 ${dates.at(-1)} 至 ${dates[0]}。`
          : "暂无有效投资记录。";

        if (!dates.length || !filtered.length) {
          els.tableWrap.innerHTML = `<div class="empty">没有匹配的数据。</div>`;
          return;
        }

        const header = [
          "<th>序号</th>",
          "<th>成员</th>",
          `<th>${sortButton("level", "等级")}</th>`,
          "<th>职位</th>",
          `<th>${sortButton("latest", "统计累计")}</th>`,
          `<th>${sortButton("growth", "对比增长")}</th>`,
          ...dates.map((date) => `<th>${escapeHtml(date)}</th>`),
        ].join("");

        const ascendingDates = [...dates].reverse();
        const previousByDate = new Map(
          ascendingDates.map((date, index) => [date, index > 0 ? ascendingDates[index - 1] : null]),
        );
        const body = filtered
          .map(({ member, latest, growth }, index) => {
            const dateCells = dates
              .map((date) => {
                if (!member.byDate.has(date)) return "<td>-</td>";
                const value = member.byDate.get(date);
                const previousDate = previousByDate.get(date);
                const previous = previousDate ? member.byDate.get(previousDate) : undefined;
                const change = previous === undefined ? 0 : value - previous;
                const delta =
                  previous === undefined || change === 0
                    ? ""
                    : ` <span class="delta ${change < 0 ? "negative" : ""}">(${formatDelta(change)})</span>`;
                return `<td>${formatAmount(value)}${delta}</td>`;
              })
              .join("");
            return `
              <tr>
                <td>${index + 1}</td>
                <td>
                  <span class="name">${escapeHtml(member.name)}</span>
                  <span class="meta">${escapeHtml((member.guildNames || [member.guildName]).join(" / "))}</span>
                </td>
                <td>${escapeHtml(member.level || "-")}</td>
                <td>${escapeHtml(member.role || "-")}</td>
                <td>${formatAmount(latest)}</td>
                <td><span class="delta ${growth < 0 ? "negative" : ""}">${formatDelta(growth) || "-"}</span></td>
                ${dateCells}
              </tr>
            `;
          })
          .join("");

        els.tableWrap.innerHTML = `<table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>`;
      }

      function render() {
        renderDateControls();
        renderSummary();
        renderGuildSelect();
        renderGuildCards();
        renderTable();
      }

      async function init() {
        try {
          const [memberResponse, guildResponse] = await Promise.all([
            fetch("data/members.json", { cache: "no-cache" }),
            fetch("data/guild-members.json", { cache: "no-cache" }),
          ]);
          if (!memberResponse.ok) throw new Error(`data/members.json: ${memberResponse.status}`);
          if (!guildResponse.ok) throw new Error(`data/guild-members.json: ${guildResponse.status}`);
          state.memberStore = await memberResponse.json();
          state.guildStore = await guildResponse.json();

          state.allDates = Array.isArray(state.memberStore.dates)
            ? [...state.memberStore.dates].sort()
            : [];
          state.requestedTargetDate = toDateInputValue(new Date());
          state.requestedBaseDate = previousMonthEnd(state.requestedTargetDate);
          state.guildModels = Object.values(state.guildStore.guilds || {}).map(buildGuildModel);
          state.globalMembers = buildGlobalMembers(state.guildModels);

          els.statusText.textContent = "已加载";
          els.generatedAt.textContent = state.memberStore.generated_at
            ? `数据更新时间：${formatDateTime(state.memberStore.generated_at)}`
            : "";
          render();
        } catch (error) {
          els.statusText.textContent = "加载失败";
          els.summaryGrid.innerHTML = "";
          els.guildGrid.innerHTML = "";
          els.tableWrap.innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
        }
      }

      els.guildSelect.addEventListener("change", (event) => {
        state.selectedGuild = event.target.value;
        renderTable();
      });

      els.rankLimitSelect.addEventListener("change", (event) => {
        state.rankLimit = Number(event.target.value) || 10;
        renderGuildCards();
      });

      els.searchInput.addEventListener("input", (event) => {
        state.query = event.target.value;
        renderTable();
      });

      els.tableWrap.addEventListener("click", (event) => {
        const button = event.target.closest("[data-sort-key]");
        if (!button) return;
        const key = button.dataset.sortKey;
        const current = state.tableSort;
        state.tableSort =
          current?.key === key
            ? { key, direction: current.direction === "desc" ? "asc" : "desc" }
            : { key, direction: "desc" };
        renderTable();
      });

      els.targetDateInput.addEventListener("change", (event) => {
        state.requestedTargetDate = event.target.value;
        render();
      });

      els.baseDateInput.addEventListener("change", (event) => {
        state.requestedBaseDate = event.target.value;
        render();
      });

      init();
    </script>
  </body>
</html>
